<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Cycler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Cycler</h1>
            <span class="subtitle">click to cycle</span>
        </header>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="what needs doing?" />
            <button id="addBtn">+ add</button>
        </div>

        <div id="taskQueue" class="task-queue">
            <!-- Tasks will appear here -->
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
